version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medtrace
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]

  medtrace-server:
    build: ./packages/server
    ports: ["8765:8765"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/medtrace
    depends_on: [postgres]

  grafana:
    image: grafana/grafana:10.4.0
    ports: ["3001:3000"]
    volumes: [grafana_data:/var/lib/grafana]

volumes:
  postgres_data:
  grafana_data:
